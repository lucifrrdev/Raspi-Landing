services:
  # ─────────────────────────────────────────────
  # Production web server
  # ─────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: raspi-landing
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - app-network

  # ─────────────────────────────────────────────
  # Development server (hot reload)
  # ─────────────────────────────────────────────
  dev:
    image: node:20-alpine
    container_name: raspi-landing-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - app-network
    profiles:
      - dev

networks:
  app-network:
    driver: bridge
